function renderQuiz() {
    const mount = document.getElementById('quiz-mount');
    if (!questions || questions.length === 0) {
        mount.innerHTML = "<p style='color:red;'>Error: No questions found in data array!</p>";
        return;
    }

    mount.innerHTML = questions.map((q, i) => {
        // Render options dynamically from the object A, B, C, D
        let optsHtml = "";
        for (const [key, value] of Object.entries(q.options)) {
            optsHtml += `
                <label class="opt">
                    <input type="radio" name="q${i}" value="${key}">
                    <strong>${key}:</strong> ${value}
                </label>
            `;
        }

        return `
            <div class="q-card">
                <span class="vignette">Question ${i + 1}:</span>
                <p>${q.vignette}</p>
                <div class="options-container">
                    ${optsHtml}
                </div>
            </div>
        `;
    }).join('');
}

function analyzePerformance() {
    const candidateName = document.getElementById('candidate').value || "ANONYMOUS CANDIDATE";
    let score = 0;
    let reportHtml = "";

    questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const userVal = selected ? selected.value : "UNANSWERED";
        const isCorrect = userVal === q.correct;
        
        if (isCorrect) score++;

        reportHtml += `
            <div class="result-row" style="border-left-color: ${isCorrect ? '#27ae60' : '#e74c3c'}">
                <span class="status-badge" style="background:${isCorrect ? '#d4edda' : '#f8d7da'}; color:${isCorrect ? '#155724' : '#721c24'}">
                    ${isCorrect ? 'SUCCESS' : 'SAFETY RISK'}
                </span>
                <p><strong>Item ${i+1}:</strong> ${q.vignette}</p>
                <p>Your Selection: <span style="color:${isCorrect ? '#27ae60' : '#e74c3c'}"><strong>${userVal}</strong></span> | Correct Key: <strong>${q.correct}</strong></p>
                <div class="rationale">
                    <strong>Clinical Rationale:</strong><br>${q.scfhs_rationale}
                </div>
            </div>`;
    });

    const percent = (score / questions.length) * 100;
    const isPass = percent >= 60;

    document.getElementById('meta-data').innerHTML = `
        <div style="background: ${isPass ? '#27ae60' : '#e74c3c'}; color: white; padding: 20px; border-radius: 12px;">
            <h1 style="margin:0; font-size: 42px;">${percent.toFixed(0)}%</h1>
            <p style="margin:5px 0; font-size: 1.2em;"><strong>${isPass ? 'PASSED / ELIGIBLE' : 'FAILED / INELIGIBLE'}</strong></p>
            <p style="margin:0; opacity: 0.9;">Candidate: ${candidateName.toUpperCase()}</p>
            <p style="margin:0; opacity: 0.9;">Raw Score: ${score} / ${questions.length}</p>
        </div>
    `;

    document.getElementById('analysis-results').innerHTML = reportHtml;
    document.getElementById('exam-view').style.display = "none";
    document.getElementById('transcript').style.display = "block";
    window.scrollTo(0,0);
}
